<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karnash Marketplace de la mode | Caisse</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #1a0933;   
            --accent-purple: #6a2b83;  
            --accent-gold: #cca43b;    
            --bg-light: #f9f8fa;       
            --text-dark: #2d2438;      
            --text-muted: #796e85;     
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(26, 9, 51, 0.08);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); line-height: 1.6; }
        a { text-decoration: none; color: inherit; }

        .navbar {
            background-color: var(--white); display: flex; justify-content: space-between; align-items: center;
            padding: 12px 8%; position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }
        .logo-container { display: flex; align-items: center; gap: 8px; }
        .logo-img { height: 32px; object-fit: contain; }
        .logo-text { font-size: 16px; font-weight: 800; color: var(--primary-color); text-transform: uppercase; }
        .logo-text span { color: var(--accent-gold); }
        .nav-links { display: flex; gap: 30px; }

        .checkout-container { padding: 40px 8%; display: flex; gap: 30px; flex-wrap: wrap; }
        .checkout-form-section { flex: 2; min-width: 350px; background-color: var(--white); padding: 35px; border-radius: 12px; box-shadow: var(--shadow); }
        
        .checkout-title { font-size: 22px; font-weight: 700; color: var(--primary-color); margin-bottom: 25px; border-bottom: 2px solid var(--bg-light); padding-bottom: 10px; }
        
        .form-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .form-group { flex: 1; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; }
        
        .form-control { width: 100%; padding: 12px; border: 1px solid #e2daf0; border-radius: 8px; font-size: 14px; background-color: #faf9fc; }
        .form-control:focus { outline: none; border-color: var(--accent-purple); background-color: var(--white); }

        /* Méthodes de Paiement */
        .payment-methods { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .payment-option { border: 1px solid #e2daf0; border-radius: 8px; padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: var(--transition); }
        .payment-option input { accent-color: var(--accent-purple); }
        .payment-option:hover { border-color: var(--accent-purple); background-color: rgba(106, 43, 131, 0.02); }

        .order-summary-box { flex: 1; min-width: 300px; background-color: var(--white); padding: 30px; border-radius: 12px; box-shadow: var(--shadow); height: fit-content; border: 1px solid rgba(106, 43, 131, 0.05); }
        .btn-order { width: 100%; background: linear-gradient(135deg, var(--accent-purple), #4a1c5c); color: var(--white); padding: 14px; border: none; border-radius: 50px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(106, 43, 131, 0.3); }

        footer { background-color: var(--primary-color); color: var(--white); padding: 30px 8%; text-align: center; font-size: 14px; border-top: 3px solid var(--accent-gold); margin-top: 60px;}
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <img src="logo.png.jpeg" alt="Karnash Logo" class="logo-img">
            <a href="index.html" class="logo-text">KARNASH<span>.Marketplace de la mode</span></a>
        </div>
        <nav class="nav-links">
            <a href="index.html">Accueil</a>
            <a href="catalogue.html">Catalogue</a>
            <a href="boutiques.html">Boutiques</a>
        </nav>
    </header>

    <div class="checkout-container">
        <div class="checkout-form-section">
            <h2 class="checkout-title"><i class="fa-solid fa-truck"></i> Informations de Livraison</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" class="form-control" placeholder="Jean" required>
                </div>
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" class="form-control" placeholder="Mukendi" required>
                </div>
            </div>
            <div class="form-group">
                <label>Adresse complète (Commune, Quartier, Avenue, Numéro)</label>
                <input type="text" class="form-control" placeholder="Ex: Gombe, Av. de la Justice, No. 12" required>
            </div>
            <div class="form-group">
                <label>Téléphone (Pour la livraison & paiement)</label>
                <input type="tel" class="form-control" placeholder="Ex: +243 812 345 678" required>
            </div>

            <h2 class="checkout-title" style="margin-top: 35px;"><i class="fa-solid fa-credit-card"></i> Mode de Paiement</h2>
            <div class="payment-methods">
                <label class="payment-option">
                    <input type="radio" name="payment" checked>
                    <div>
                        <strong>Mobile Money (M-Pesa / Orange Money / Airtel Money)</strong>
                        <p style="font-size: 12px; color: var(--text-muted);">Payez instantanément avec votre compte mobile.</p>
                    </div>
                </label>
                <label class="payment-option">
                    <input type="radio" name="payment">
                    <div>
                        <strong>Paiement à la livraison (Cash)</strong>
                        <p style="font-size: 12px; color: var(--text-muted);">Payez en espèces dès que vous recevez votre colis.</p>
                    </div>
                </label>
            </div>
        </div>

        <div class="order-summary-box">
            <h3 style="font-size: 18px; margin-bottom: 20px; color: var(--primary-color);">Votre Commande</h3>
            <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; color: var(--text-muted);">
                <span>Mocassins Artisanal (x1)</span>
                <span>120 $</span>
            </div>
            <hr style="border: 0; border-top: 1px solid var(--bg-light); margin: 15px 0;">
            <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 16px;">
                <span>Total à payer</span>
                <span style="color: var(--accent-purple);">120 $</span>
            </div>

            <button class="btn-order">Confirmer l'achat</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 KARNASH MARKETPLACE DE LA MODE - Tous droits réservés.</p>
    </footer>
</footer>

<script>
    function rafraichirCompteurPanier() {
        let nbArticles = localStorage.getItem('compteurPanier') || 0;
        const badge = document.getElementById('cart-count') || document.querySelector('.badge');
        if (badge) {
            badge.innerText = nbArticles;
        }
    }
    document.addEventListener('DOMContentLoaded', rafraichirCompteurPanier);
</script>

</body>
</html>
