<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finaliser ma Commande | Vogue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #f4f5f7;
            --card-bg: #ffffff;
            --accent-purple: #6c5ce7;
            --text-color: #2d3436;
            --border-color: #dfe6e9;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .order-container {
            max-width: 800px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media(min-width: 768px) {
            .order-container { grid-template-columns: 1fr 350px; }
        }
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            box-sizing: border-box;
        }
        .card h2 { margin-top: 0; font-size: 18px; color: var(--accent-purple); border-bottom: 2px solid #f4f5f7; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; }
        .form-control {
            width: 100%; padding: 10px; border: 1px solid var(--border-color);
            border-radius: 6px; font-size: 14px; box-sizing: border-box; outline: none;
        }
        
        .summary-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #f4f5f7; font-size: 14px;
        }
        .total-row {
            display: flex; justify-content: space-between; font-weight: bold;
            font-size: 18px; margin-top: 15px; color: var(--text-color);
        }
        .btn-confirm {
            width: 100%; padding: 14px; background: #6c5ce7; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.2s; margin-top: 20px;
        }
        .btn-confirm:hover { background: #5b4cc4; }
        .back-link { display: inline-block; margin-bottom: 15px; color: var(--accent-purple); text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div style="max-width: 800px; margin: 0 auto;">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Retourner au catalogue</a>
    </div>

    <div class="order-container">
        <div class="card">
            <h2><i class="fa-solid fa-truck"></i> Informations de livraison</h2>
            <form id="finalOrderForm">
                <div class="form-group">
                    <label>Nom complet du destinataire</label>
                    <input type="text" id="custName" class="form-control" required placeholder="Ex: Jonathan Mpiana">
                </div>
                <div class="form-group">
                    <label>Numéro de Téléphone (WhatsApp)</label>
                    <input type="tel" id="custPhone" class="form-control" required placeholder="Ex: +243 820 000 000">
                </div>
                <div class="form-group">
                    <label>Adresse complète (Commune, Quartier, Avenue, Numéro)</label>
                    <textarea id="custAddress" class="form-control" rows="3" required placeholder="Ex: Gombe, Av. de la Justice, N°45..."></textarea>
                </div>
                <div class="form-group">
                    <label>Mode de paiement préféré</label>
                    <select id="payMethod" class="form-control">
                        <option value="Mpesa">📱 M-Pesa (Vodacom)</option>
                        <option value="AirtelMoney">📱 Airtel Money</option>
                        <option value="OrangeMoney">📱 Orange Money</option>
                        <option value="Cash">💵 Cash à la livraison</option>
                    </select>
                </div>
                <button type="submit" class="btn-confirm">Procéder au paiement <i class="fa-solid fa-arrow-right"></i></button>
            </form>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-receipt"></i> Votre facture</h2>
            <div id="invoiceItems"></div>
            <div class="total-row">
                <span>Total :</span>
                <span id="invoiceTotal">0 $</span>
            </div>
        </div>
    </div>

    <script>
        let panierAchat = JSON.parse(localStorage.getItem('panier_vogue')) || [];
        let totalFacture = 0;

        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('invoiceItems');
            const totalContainer = document.getElementById('invoiceTotal');
            
            if(panierAchat.length === 0) {
                container.innerHTML = "<p style='color:#7f8c8d; text-align:center;'>Votre panier est vide.</p>";
                return;
            }

            container.innerHTML = "";

            panierAchat.forEach(item => {
                totalFacture += parseFloat(item.price) || 0;
                container.innerHTML += `
                    <div class="summary-item">
                        <div>
                            <strong style="display:block;">${item.name}</strong>
                            <small style="color:#7f8c8d;">Boutique : ${item.shop}</small>
                        </div>
                        <span style="font-weight:bold; color:var(--accent-purple);">${item.price} $</span>
                    </div>
                `;
            });

            totalContainer.innerText = totalFacture + " $";
        });

        document.getElementById('finalOrderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // On sauvegarde le total et le mode choisi pour la page de paiement
            const infoPaiement = {
                client: document.getElementById('custName').value.trim(),
                telephone: document.getElementById('custPhone').value.trim(),
                adresse: document.getElementById('custAddress').value.trim(),
                methode: document.getElementById('payMethod').value,
                total: totalFacture
            };
            
            localStorage.setItem('dernier_achat', JSON.stringify(infoPaiement));
            
            // 🟢 REDIRECTION DIRECTE VERS LA PAGE DE PAIEMENT
            window.location.href = "paiement.html";
        });
    </script>
</body>
</html>
