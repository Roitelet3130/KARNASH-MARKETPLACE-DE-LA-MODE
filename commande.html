<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiche de Commande & Discussion | Vogue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #f4f5f7;
            --card-bg: #ffffff;
            --accent-purple: #6c5ce7;
            --text-color: #2d3436;
            --border-color: #dfe6e9;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--primary-bg);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }
        .main-wrapper {
            max-width: 1000px; width: 100%;
            display: block;
        }
        .grid-container {
            display: table; width: 100%; table-layout: fixed; border-spacing: 20px 0;
        }
        .grid-col {
            display: table-cell; vertical-align: top;
        }
        .card {
            background: var(--card-bg); border-radius: 12px;
            padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px; box-sizing: border-box;
        }
        h2, h3 { margin-top: 0; color: var(--text-color); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        .form-control {
            width: 100%; padding: 10px; border: 1px solid var(--border-color);
            border-radius: 6px; font-size: 14px; box-sizing: border-box; outline: none;
        }
        .btn-purple {
            width: 100%; padding: 12px; background: var(--accent-purple); color: white;
            border: none; border-radius: 6px; font-size: 15px; font-weight: bold;
            cursor: pointer; transition: 0.2s; text-align: center; display: block; text-decoration: none;
        }
        .btn-purple:hover { background: #5b4cc4; }
        
        /* 💬 STYLE DE LA MESSAGERIE INTÉGRÉE */
        .chat-box {
            border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden;
        }
        .chat-messages {
            height: 180px; overflow-y: auto; background: #f8f9fa; padding: 15px;
        }
        .message {
            margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; max-width: 80px; font-size: 13px;
            clear: both;
        }
        .message.client { background: var(--accent-purple); color: white; float: right; }
        .message.vendeur { background: #e2e8f0; color: var(--text-color); float: left; }
        .chat-input-area {
            display: table; width: 100%; border-top: 1px solid var(--border-color); background: white;
        }
        .chat-input-cell { display: table-cell; vertical-align: middle; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <p><a href="index.html" style="color: var(--accent-purple); text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> Retourner au catalogue</a></p>
    
    <div class="grid-container">
        <div class="grid-col" style="width: 55%;">
            <div class="card">
                <h2><i class="fa-solid fa-truck"></i> Informations de livraison</h2>
                <form id="orderForm">
                    <div class="form-group">
                        <label>Nom complet du destinataire</label>
                        <input type="text" id="clientName" class="form-control" placeholder="Ex: Junior Mabiala" required>
                    </div>
                    <div class="form-group">
                        <label>Numéro de Téléphone (WhatsApp)</label>
                        <input type="tel" id="clientPhone" class="form-control" placeholder="Ex: 0841570250" required>
                    </div>
                    <div class="form-group">
                        <label>Adresse complète (Commune, Quartier, Avenue, Numéro)</label>
                        <textarea id="clientAddress" class="form-control" rows="3" placeholder="Ex: Gombe, Av. De la Justice, N°12" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Mode de paiement préféré</label>
                        <select id="paymentMethod" class="form-control">
                            <option value="OrangeMoney">📱 Orange Money</option>
                            <option value="Mpesa">📱 M-Pesa</option>
                            <option value="AirtelMoney">📱 Airtel Money</option>
                            <option value="Cash">💵 Paiement Cash à la livraison</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-purple">Procéder au paiement <i class="fa-solid fa-arrow-right"></i></button>
                </form>
            </div>
        </div>

        <div class="grid-col" style="width: 45%;">
            <div class="card">
                <h3><i class="fa-solid fa-file-invoice-dollar"></i> Votre facture</h3>
                <div id="factureItems" style="margin-bottom: 15px;">
                    </div>
                <hr style="border: 0; border-top: 1px solid var(--border-color);">
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; margin-top: 10px;">
                    <span>Total :</span>
                    <span id="factureTotal" style="color: var(--accent-purple);">0 $</span>
                </div>
            </div>

            <div class="card">
                <h3><i class="fa-solid fa-comments"></i> Discuter avec le vendeur</h3>
                <p style="font-size: 12px; color: #7f8c8d; margin-top:-5px;">Posez vos questions sur les tailles, couleurs avant de payer.</p>
                
                <div class="chat-box">
                    <div class="chat-messages" id="chatContainer">
                        <div class="message vendeur">Bonjour ! Merci pour votre intérêt. Des précisions sur la taille ou la couleur ?</div>
                    </div>
                    <div class="chat-input-area">
                        <div class="chat-input-cell" style="padding: 10px;">
                            <input type="text" id="chatInput" class="form-control" placeholder="Écrire au vendeur..." style="width: 100%;">
                        </div>
                        <div class="chat-input-cell" style="width: 60px; text-align: center; padding-right: 10px;">
                            <button onclick="envoyerMessage()" style="background: #2ecc71; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%;">
                                <i class="fa-solid fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Charger le panier actuel
    const panier = JSON.parse(localStorage.getItem('panier_vogue')) || [];
    
    document.addEventListener('DOMContentLoaded', function() {
        const container = document.getElementById('factureItems');
        let totalGlobal = 0;

        if(panier.length === 0) {
            container.innerHTML = "<p style='color:#7f8c8d;'>Votre panier est vide.</p>";
            return;
        }

        container.innerHTML = '';
        panier.forEach(item => {
            let prixNet = String(item.price).replace('$', '').trim();
            totalGlobal += parseFloat(prixNet) || 0;
            
            container.innerHTML += `
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px;">
                    <div>
                        <strong>${item.name}</strong><br>
                        <small style="color:#7f8c8d;">Boutique : ${item.shop}</small>
                    </div>
                    <span style="font-weight:bold;">${item.price} $</span>
                </div>
            `;
        });

        document.getElementById('factureTotal').innerText = totalGlobal.toFixed(2) + " $";
    });

    // Gestion de la simulation de discussion
    window.envoyerMessage = function() {
        const input = document.getElementById('chatInput');
        const container = document.getElementById('chatContainer');
        if(!input.value.trim()) return;

        // Message du Client
        const txtClient = input.value;
        container.innerHTML += `<div class="message client">${txtClient}</div>`;
        input.value = '';
        container.scrollTop = container.scrollHeight;

        // Réponse automatique du Vendeur simulée après 1 seconde
        setTimeout(() => {
            container.innerHTML += `<div class="message vendeur">Parfait, c'est bien noté pour votre commande ! Je prépare le colis.</div>`;
            container.scrollTop = container.scrollHeight;
        }, 1200);
    };

    // Soumission de la commande -> Enregistrement et Redirection vers paiement.html
    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        let totalGlobal = 0;
        panier.forEach(item => {
            let prixNet = String(item.price).replace('$', '').trim();
            totalGlobal += parseFloat(prixNet) || 0;
        });

        const achatData = {
            client: document.getElementById('clientName').value,
            telephone: document.getElementById('clientPhone').value,
            adresse: document.getElementById('clientAddress').value,
            methode: document.getElementById('paymentMethod').value,
            total: totalGlobal
        };

        // Sauvegarde pour la page paiement.html
        localStorage.setItem('dernier_achat', JSON.stringify(achatData));
        
        // 🚀 Redirection vers la page de paiement
        window.location.href = "paiement.html";
    });
</script>
</body>
</html>
