<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Directe | Vogue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #f4f5f7;
            --card-bg: #ffffff;
            --accent-purple: #6c5ce7;
            --text-color: #2d3436;
            --border-color: #dfe6e9;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .auth-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { margin: 0 0 10px 0; font-size: 26px; }
        .auth-header p { color: #7f8c8d; margin: 0; font-size: 14px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #b2bec3; }
        .form-control {
            width: 100%; padding: 12px 12px 12px 45px;
            border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 14px; box-sizing: border-box;
            outline: none;
        }
        .form-control:focus { border-color: var(--accent-purple); }
        
        .btn-auth {
            width: 100%; padding: 12px;
            background: var(--accent-purple); color: white;
            border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: background 0.3s;
        }
        .btn-auth:hover { background: #5b4cc4; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; }
        .auth-footer a { color: var(--accent-purple); text-decoration: none; font-weight: bold; }
        .forgot-pass { text-align: right; margin-bottom: 20px; }
        .forgot-pass a { color: var(--accent-purple); text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h2>Bon retour !</h2>
        <p>Connectez-vous pour ouvrir votre espace</p>
    </div>

    <form id="directLoginForm">
        <div class="form-group">
            <label>Adresse Email</label>
            <div class="input-wrap">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" class="form-control" placeholder="exemple@vogue.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>Mot de passe</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <div class="forgot-pass">
            <a href="#" id="forgot-password">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-auth">Se connecter</button>
    </form>

    <div class="auth-footer">
        Nouveau sur Vogue ? <a href="inscription.html">Créez un compte complet</a>
    </div>
</div>

<script>
document.getElementById('directLoginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const emailSaisi = document.getElementById('email').value.trim().toLowerCase();
    const passwordSaisi = document.getElementById('password').value;

    // --- COMPTES STATIQUES PAR DÉFAUT ---
    const vendeurEmailDefaut = "roiteletnzau611@gmail.com";
    const vendeurPasswordDefaut = "1234";

    const superAdminEmail = "admin@vogue.com";
    const superAdminPassword = "1234";

    // --- RÉCUPÉRATION DES COMPTES ENREGISTRÉS ---
    const emailInscrit = localStorage.getItem('userEmail');
    const passwordInscrit = localStorage.getItem('userPassword');
    const roleInscrit = localStorage.getItem('userRole');

    // --- VALIDATION DIRECTE SANS BOÎTE DE DIALOGUE INTERRUPTIVE ---
    if (emailSaisi === emailInscrit && passwordSaisi === passwordInscrit) {
        if (roleInscrit === 'vendeur') {
            window.location.href = 'boutique.html'; // Sa propre boutique d'articles
        } else {
            window.location.href = 'index.html'; // Espace client / catalogue
        }
    } 
    else if (emailSaisi === vendeurEmailDefaut && passwordSaisi === vendeurPasswordDefaut) {
        window.location.href = 'boutique.html'; // Ton compte vendeur va direct dans SA boutique
    } 
    else if (emailSaisi === superAdminEmail && passwordSaisi === superAdminPassword) {
        window.location.href = 'dashboard.html'; // Le panneau admin général global
    } 
    else if (emailSaisi === "client@vogue.com" && passwordSaisi === "1234") {
        window.location.href = 'index.html';
    } 
    else {
        alert("Identifiants incorrects. Veuillez réessayer.");
    }
});

// --- CODE DE RÉCUPÉRATION MOT DE PASSE ---
document.getElementById('forgot-password').addEventListener('click', function(e) {
    e.preventDefault();
    const emailSaisi = prompt("Entrez votre e-mail pour retrouver votre mot de passe :");
    if (emailSaisi) {
        const mail = emailSaisi.trim().toLowerCase();
        if (mail === localStorage.getItem('userEmail')) {
            alert("🔑 Mot de passe : " + localStorage.getItem('userPassword'));
        } else if (mail === "roiteletnzau611@gmail.com") {
            alert("🔑 Mot de passe Vendeur par défaut : 1234");
        } else {
            alert("❌ Aucun compte trouvé.");
        }
    }
});
</script>

</body>
</html>
