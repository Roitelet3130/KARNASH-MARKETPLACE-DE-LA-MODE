<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Directe | Vogue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #f4f5f7; /* Couleur de fond d'origine */
            --card-bg: #ffffff; /* Couleur de la carte d'origine */
            --accent-purple: #6c5ce7; /* Ta couleur violette */
            --text-color: #2d3436;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .auth-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header img { 
            width: 60px; /* Taille de ton logo d'origine */
            height: 60px; 
            object-fit: contain; 
            margin-bottom: 15px;
        }
        .auth-header h2 { margin: 0 0 10px 0; font-size: 26px; }
        .auth-header p { color: #7f8c8d; margin: 0; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%); color: #b2bec3;
        }
        .form-control {
            width: 100%; padding: 12px 12px 12px 45px;
            border: 1px solid #dfe6e9; border-radius: 8px;
            font-size: 14px; box-sizing: border-box;
        }
        .form-control:focus { border-color: var(--accent-purple); outline: none; }
        .forgot-link-container { text-align: right; margin-bottom: 20px; }
        .forgot-link-container a { color: var(--accent-purple); text-decoration: none; font-size: 12px; }
        .btn-auth {
            width: 100%; padding: 12px; background-color: var(--accent-purple);
            color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: background 0.3s;
        }
        .btn-auth:hover { background-color: #5b4cc4; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; }
        .auth-footer a { color: var(--accent-purple); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <img src="logo.png" alt="Logo Vogue" onerror="this.style.display='none'"> 
        <h2>Bon retour !</h2>
        <p>Connectez-vous à votre espace Vogue</p>
    </div>

    <form id="directLoginForm">
        <div class="form-group">
            <label>Adresse Email</label>
            <div class="input-wrap">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" class="form-control" placeholder="exemple@vogue.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>Mot de passe</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <div class="forgot-link-container">
            <a href="#" id="forgot-password">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-auth">Se connecter</button>
    </form>

    <div class="auth-footer">
        Nouveau sur Vogue ? <a href="inscription.html">Créez un compte</a>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('directLoginForm');
    
    if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Empêche le rechargement de la page
            
            // Récupération des données tapées par l'utilisateur
            const emailSaisi = document.getElementById('email').value.trim().toLowerCase();
            const passwordSaisi = document.getElementById('password').value;
            
            // --- CONFIGURATION DES COMPTES PAR DÉFAUT ---
            
            // 1. Ton compte VENDEUR
            const vendeurEmailDefaut = "roiteletnzau611@gmail.com";
            const vendeurPasswordDefaut = "1234"; // Tu pourras changer ce mot de passe
            
            // 2. Un compte CLIENT exemple
            const clientEmailDefaut = "client@vogue.com";
            const clientPasswordDefaut = "1234";

            // --- CONNEXION INSTANTANÉE ET REDIRECTION ---

            if (emailSaisi === vendeurEmailDefaut && passwordSaisi === vendeurPasswordDefaut) {
                // S'il s'agit du vendeur, on enregistre son rôle en mémoire pour débloquer le dashboard
                localStorage.setItem('userRole', 'vendeur');
                localStorage.setItem('userEmail', emailSaisi);
                
                // Redirection DIRECTE vers ton beau tableau de bord
                window.location.href = 'dashboard.html'; 
            } 
            else if (emailSaisi === clientEmailDefaut && passwordSaisi === clientPasswordDefaut) {
                // S'il s'agit du client, il n'a pas accès au dashboard
                localStorage.setItem('userRole', 'client');
                localStorage.setItem('userEmail', emailSaisi);
                
                // Redirection vers le catalogue (index.html)
                window.location.href = 'index.html'; 
            } 
            else {
                // On garde l'alerte UNIQUEMENT si c'est faux
                alert("Identifiants incorrects. Veuillez réessayer.");
            }
        });
    }

    // --- SCRIPT DE RÉCUPÉRATION DU MOT DE PASSE INTERACTIF ---
    const linkForgot = document.getElementById('forgot-password');
    if (linkForgot) {
        linkForgot.addEventListener('click', function(e) {
            e.preventDefault(); // Empêche le lien de recharger la page
            
            const emailSaisi = prompt("Veuillez entrer votre adresse e-mail pour récupérer votre mot de passe :");
            
            if (emailSaisi) {
                const emailNettoye = emailSaisi.trim().toLowerCase();
                
                // On récupère les comptes par défaut pour lui rappeler
                const vendeurEmailDefaut = "roiteletnzau611@gmail.com";
                const vendeurPasswordDefaut = "1234"; 
                
                const clientEmailDefaut = "client@vogue.com";
                const clientPasswordDefaut = "1234";

                if (emailNettoye === vendeurEmailDefaut) {
                    alert("🔑 Récupération de compte Vendeur :\n\nVotre mot de passe est : " + vendeurPasswordDefaut);
                } else if (emailNettoye === clientEmailDefaut) {
                    alert("🔑 Récupération de compte Client :\n\nVotre mot de passe est : " + clientPasswordDefaut);
                } else {
                    alert("❌ Aucune boutique ou compte vendeur n'est enregistré avec cette adresse e-mail.");
                }
            }
        });
    }
});
</script>

</body>
</html>
