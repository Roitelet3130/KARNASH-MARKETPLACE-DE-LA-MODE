<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vogue Marketplace | Connexion</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Même design system et variables pour garantir une harmonie visuelle */
        :root {
            --primary-color: #1a0933;   
            --accent-purple: #6a2b83;  
            --accent-gold: #cca43b;    
            --bg-light: #f9f8fa;       
            --text-dark: #2d2438;      
            --text-muted: #796e85;     
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(26, 9, 51, 0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            background-color: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(106, 43, 131, 0.05);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header img {
            height: 50px;
            margin-bottom: 15px;
        }

        .auth-header h2 {
            font-size: 26px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--primary-color);
        }

        .input-icon-wrap {
            position: relative;
        }

        .input-icon-wrap i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #e2daf0;
            border-radius: 8px;
            font-size: 14px;
            background-color: #faf9fc;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-purple);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(106, 43, 131, 0.1);
        }

        .forgot-password {
            display: flex;
            justify-content: flex-end;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .forgot-password a {
            font-size: 13px;
            color: var(--accent-purple);
            font-weight: 500;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .btn-auth {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-purple), #4a1c5c);
            color: var(--white);
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(106, 43, 131, 0.2);
        }

        .btn-auth:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(106, 43, 131, 0.3);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent-purple);
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <img src="logo.png" alt="Vogue Logo" onerror="this.style.display='none';">
            <h2>Bon retour !</h2>
            <p>Connectez-vous à votre espace Vogue</p>
        </div>

        <form action="index.html">
            <div class="form-group">
                <label for="email">Adresse Email</label>
                <div class="input-icon-wrap">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" class="form-control" placeholder="exemple@vogue.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="forgot-password">
                <a href="#">Mot de passe oublié ?</a>
            </div>

            <button type="submit" class="btn-auth">Se connecter</button>
        </form>

        <div class="auth-footer">
            <p>Nouveau sur Vogue ? <a href="inscription.html">Créez un compte</a></p>
        </div>
    </div>

</body>
</html>
