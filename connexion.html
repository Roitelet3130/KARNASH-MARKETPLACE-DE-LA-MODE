<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Vogue Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #f4f5f7;
            --card-bg: #ffffff;
            --accent-purple: #6c5ce7;
            --text-color: #2d3436;
            --input-border: #dfe6e9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .auth-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h2 {
            margin: 0 0 10px 0;
            font-size: 26px;
        }
        .auth-header p {
            color: #7f8c8d;
            margin: 0;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .input-icon-wrap {
            position: relative;
        }
        .input-icon-wrap i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #b2bec3;
        }
        .form-control {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            border-color: var(--accent-purple);
        }
        .forgot-link-container {
            text-align: right;
            margin-bottom: 20px;
        }
        .forgot-link-container a {
            color: var(--accent-purple);
            text-decoration: none;
            font-size: 13px;
        }
        .btn-auth {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-auth:hover {
            background-color: #5b4cc4;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .auth-footer a {
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h2>Bon retour !</h2>
        <p>Connectez-vous à votre espace Vogue</p>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">Adresse Email</label>
            <div class="input-icon-wrap">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" class="form-control" placeholder="exemple@vogue.com" required>
            </div>
        </div>

        <div class="form-group">
            <label for="password">Mot de passe</label>
            <div class="input-icon-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <div class="forgot-link-container">
            <a href="#" id="forgot-password">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-auth">Se connecter</button>
    </form>

    <div class="auth-footer">
        Nouveau sur Vogue ? <a href="inscription.html">Créez un compte</a>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('loginForm');

    if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            // Récupération des données saisies
            const emailSaisi = document.getElementById('email').value.trim().toLowerCase();
            const passwordSaisi = document.getElementById('password').value;

            // Comptes créés "Par Défaut" (au cas où on n'utilise pas l'inscription)
            const vendeurEmailDefaut = "roiteletnzau611@gmail.com";
            const vendeurPasswordDefaut = "1234";

            const clientEmailDefaut = "client@vogue.com";
            const clientPasswordDefaut = "1234";

            // Récupération du compte éventuellement inscrit via inscription.html
            const emailInscrit = localStorage.getItem('userEmail');
            const passwordInscrit = localStorage.getItem('userPassword');
            const roleInscrit = localStorage.getItem('userRole');

            // --- VÉRIFICATION & CONNEXION DIRECTE ---
            
            // 1. Test du compte inscrit dynamiquement
            if (emailSaisi === emailInscrit && passwordSaisi === passwordInscrit) {
                if (roleInscrit === 'vendeur') {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
            // 2. Test du compte Vendeur par défaut
            else if (emailSaisi === vendeurEmailDefaut && passwordSaisi === vendeurPasswordDefaut) {
                window.location.href = 'dashboard.html';
            }
            // 3. Test du compte Client par défaut
            else if (emailSaisi === clientEmailDefaut && passwordSaisi === clientPasswordDefaut) {
                window.location.href = 'index.html';
            }
            // 4. Erreur si rien ne correspond
            else {
                alert("Identifiants incorrects. Veuillez réessayer.");
            }
        });
    }

    // --- LOGIQUE INTERACTIVE DU MOT DE PASSE OUBLIÉ ---
    const linkForgot = document.getElementById('forgot-password');
    if (linkForgot) {
        linkForgot.addEventListener('click', function(e) {
            e.preventDefault();
            
            const emailSaisi = prompt("Veuillez entrer votre adresse e-mail pour récupérer votre mot de passe :");
            
            if (emailSaisi) {
                const emailNettoye = emailSaisi.trim().toLowerCase();
                
                const vendeurEmailDefaut = "roiteletnzau611@gmail.com";
                const vendeurPasswordDefaut = "1234";
                
                const clientEmailDefaut = "client@vogue.com";
                const clientPasswordDefaut = "1234";

                const emailInscrit = localStorage.getItem('userEmail');
                const passwordInscrit = localStorage.getItem('userPassword');

                if (emailNettoye === emailInscrit) {
                    alert("🔑 Mot de passe retrouvé :\n\nVotre mot de passe est : " + passwordInscrit);
                } else if (emailNettoye === vendeurEmailDefaut) {
                    alert("🔑 Compte Vendeur par défaut :\n\nVotre mot de passe est : " + vendeurPasswordDefaut);
                } else if (emailNettoye === clientEmailDefaut) {
                    alert("🔑 Compte Client par défaut :\n\nVotre mot de passe est : " + clientPasswordDefaut);
                } else {
                    alert("❌ Aucun compte n'est enregistré avec cette adresse e-mail.");
                }
            }
        });
    }
});
</script>

</body>
</html>
