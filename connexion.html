<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
</head>
<body>
    <h2>Connexion</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    <button id="btnConnexion">Se connecter</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        
        // Ta config ici
        const firebaseConfig = { /* ... */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btnConnexion').onclick = () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, password)
                .then(() => window.location.href = "catalogue.html")
                .catch(err => alert(err.message));
        };
    </script>
</body>
</html>
