<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Vogue Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #f4f5f7;
            --card-bg: #ffffff;
            --accent-purple: #6c5ce7;
            --text-color: #2d3436;
            --input-border: #dfe6e9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .auth-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h2 {
            margin: 0 0 10px 0;
            font-size: 26px;
        }
        .auth-header p {
            color: #7f8c8d;
            margin: 0;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .input-icon-wrap {
            position: relative;
        }
        .input-icon-wrap i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #b2bec3;
        }
        .form-control {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            border-color: var(--accent-purple);
        }
        .role-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .role-option {
            flex: 1;
            text-align: center;
        }
        .role-option input {
            display: none;
        }
        .role-option label {
            display: block;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        .role-option input:checked + label {
            background-color: var(--accent-purple);
            color: white;
            border-color: var(--accent-purple);
        }
        .btn-auth {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-auth:hover {
            background-color: #5b4cc4;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .auth-footer a {
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h2>Créer un compte</h2>
        <p>Rejoignez la communauté Vogue Marketplace</p>
    </div>

    <form id="registerForm">
        <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <div class="input-icon-wrap">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" class="form-control" placeholder="Votre pseudo" required>
            </div>
        </div>

        <div class="form-group">
            <label for="email">Adresse Email</label>
            <div class="input-icon-wrap">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" class="form-control" placeholder="exemple@vogue.com" required>
            </div>
        </div>

        <div class="form-group">
            <label for="password">Mot de passe</label>
            <div class="input-icon-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <label style="display:block; margin-bottom:8px; font-weight:600; font-size:14px;">Je souhaite être :</label>
        <div class="role-group">
            <div class="role-option">
                <input type="radio" name="role" id="roleClient" value="client" checked>
                <label for="roleClient">Client</label>
            </div>
            <div class="role-option">
                <input type="radio" name="role" id="roleVendeur" value="vendeur">
                <label for="roleVendeur">Vendeur</label>
            </div>
        </div>

        <button type="submit" class="btn-auth">S'inscrire</button>
    </form>

    <div class="auth-footer">
        Déjà un compte ? <a href="connexion.html">Connectez-vous</a>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const registerForm = document.getElementById('registerForm');

    if (registerForm) {
        registerForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;

            // Sauvegarde des données dans le localStorage (Simule une base de données)
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userPassword', password);
            localStorage.setItem('userRole', role);
            localStorage.setItem('userName', username);

            // Redirection immédiate vers la page de connexion
            window.location.href = 'connexion.html?registered=true';
        });
    }
});
</script>

</body>
</html>
