<input type="text" id="productName" placeholder="Nom">
<input type="number" id="productPrice" placeholder="Prix">
<textarea id="productDesc" placeholder="Description"></textarea>
<button onclick="publier()">Mettre en vente</button>

<script type="module">
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
    // (Utilise la même config Firebase que ci-dessus)
    
    window.publier = function() {
        const db = getDatabase();
        push(ref(db, 'produits/'), {
            nom: document.getElementById('productName').value,
            prix: document.getElementById('productPrice').value,
            description: document.getElementById('productDesc').value
        });
        alert("Publié sur le serveur !");
    };
</script>
