<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Espace Vendeur | Vogue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #f4f5f7;
            --card-bg: #ffffff;
            --accent-purple: #6c5ce7;
            --text-color: #2d3436;
            --border-color: #dfe6e9;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }
        .vendeur-container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            margin-bottom: 25px;
        }
        .shop-info { display: flex; align-items: center; gap: 15px; }
        .shop-logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #eee; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media(max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } }
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        .form-control {
            width: 100%; padding: 10px; border: 1px solid var(--border-color);
            border-radius: 6px; box-sizing: border-box; font-size: 14px; outline: none;
        }
        .form-control:focus { border-color: var(--accent-purple); }
        .btn-publier {
            width: 100%; padding: 12px; background: var(--accent-purple);
            color: white; border: none; border-radius: 6px; font-size: 15px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-publier:hover { background: #5b4cc4; }
        .product-item {
            display: flex; align-items: center; gap: 15px;
            padding: 10px; border-bottom: 1px solid var(--border-color);
        }
        .product-item img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
        .logout-btn { color: #e74c3c; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="vendeur-container">
    <div class="header-box">
        <div class="shop-info">
            <img id="displayLogo" class="shop-logo" src="https://via.placeholder.com/60" alt="Logo">
            <div>
                <h2 id="displayShopName" style="margin:0;">Ma Boutique</h2>
                <p id="displayVendorName" style="margin:5px 0 0 0; color:#7f8c8d; font-size:14px;">Vendeur Vogue</p>
            </div>
        </div>
        <a href="connexion.html" class="logout-btn"><i class="fa-solid fa-sign-out-alt"></i> Déconnexion</a>
    </div>

    <div class="grid-layout">
        <div class="card">
            <h3 style="margin-top:0; color: var(--accent-purple);"><i class="fa-solid fa-plus-circle"></i> Publier un nouvel article</h3>
            <form id="addProductForm">
                <div class="form-group">
                    <label>Nom de l'article</label>
                    <input type="text" id="pName" class="form-control" placeholder="Ex: Chemise Oversize en Lin" required>
                </div>
                <div class="form-group">
                    <label>Prix (en $ USD)</label>
                    <input type="number" id="pPrice" class="form-control" placeholder="Ex: 45" required>
                </div>
                <div class="form-group">
                    <label>Catégorie</label>
                    <select id="pCategory" class="form-control">
                        <option value="Vêtements">Vêtements</option>
                        <option value="Chaussures">Chaussures</option>
                        <option value="Accessoires">Accessoires / Bijoux</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="pDesc" class="form-control" rows="3" placeholder="Détails de l'article, tailles disponibles..."></textarea>
                </div>
                <div class="form-group">
                    <label>Image de l'article</label>
                    <input type="file" id="pImage" accept="image/*" required>
                </div>
                <button type="submit" class="btn-publier">Mettre en vente immédiatement</button>
            </form>
        </div>

        <div class="card">
            <h3 style="margin-top:0;"><i class="fa-solid fa-boxes-stacked"></i> Mes articles en ligne</h3>
            <div id="myProductsList">
                </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 1. Récupérer les données de la boutique inscrite
    const registeredUser = JSON.parse(localStorage.getItem('registeredUser')) || {
        fullName: "Roitelet N'zau",
        shopName: "Karnash Marketplace",
        shopLogo: ""
    };

    document.getElementById('displayShopName').innerText = registeredUser.shopName;
    document.getElementById('displayVendorName').innerText = "Gérant : " + registeredUser.fullName;
    if(registeredUser.shopLogo) {
        document.getElementById('displayLogo').src = registeredUser.shopLogo;
    }

    // 2. Charger les produits existants
    displayMyProducts();

    // 3. Soumission du formulaire d'ajout
    document.getElementById('addProductForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const name = document.getElementById('pName').value.trim();
        const price = document.getElementById('pPrice').value;
        const category = document.getElementById('pCategory').value;
        const desc = document.getElementById('pDesc').value.trim();
        const imageInput = document.getElementById('pImage').files[0];

        const reader = new FileReader();
        reader.onloadend = function() {
            const allProducts = JSON.parse(localStorage.getItem('globalProducts')) || [];
            
            const newProduct = {
                id: Date.now(),
                shopName: registeredUser.shopName,
                name: name,
                price: price,
                category: category,
                desc: desc,
                image: reader.result
            };

            allProducts.push(newProduct);
            localStorage.setItem('globalProducts', JSON.stringify(allProducts));

            document.getElementById('addProductForm').reset();
            displayMyProducts();
        };
        reader.readAsDataURL(imageInput);
    });

    function displayMyProducts() {
        const allProducts = JSON.parse(localStorage.getItem('globalProducts')) || [];
        const container = document.getElementById('myProductsList');
        container.innerHTML = '';

        // Filtrer pour ne voir que les produits de cette boutique précise
        const myProducts = allProducts.filter(p => p.shopName === registeredUser.shopName);

        if(myProducts.length === 0) {
            container.innerHTML = '<p style="color:#7f8c8d; font-style:italic;">Aucun article publié pour le moment.</p>';
            return;
        }

        myProducts.forEach(p => {
            container.innerHTML += `
                <div class="product-item">
                    <img src="${p.image}" alt="">
                    <div style="flex:1;">
                        <strong style="display:block;">${p.name}</strong>
                        <span style="font-size:12px; color:#7f8c8d;">Catégorie: ${p.category}</span>
                    </div>
                    <span style="font-weight:bold; color:var(--accent-purple);">${p.price} $</span>
                </div>
            `;
        });
    }
});
</script>
</body>
</html>
