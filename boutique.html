<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- ... (Garde ton <head> tel quel) ... -->
    <meta charset="UTF-8">
    <title>Espace Vendeur | KARNASH MARKETPLACE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- J'ai ajouté le support Firebase ici -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAqMJkvmJr_-izr7PzWL-SdlRovtMQoFs",
            authDomain: "karnash-marketplace-de-la-mode.firebaseapp.com",
            projectId: "karnash-marketplace-de-la-mode",
            storageBucket: "karnash-marketplace-de-la-mode.firebasestorage.app",
            messagingSenderId: "94247832680",
            appId: "1:94247832680:web:dc4b82a1d46b008049bfdd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- Tes fonctions originales remaniées ---
        
        // On synchronise au chargement
        window.saveToFirebase = function(products) {
            set(ref(db, 'globalProducts/'), products);
        };

        // ... (Le reste de ton JS ci-dessous)
        window.dbRef = ref(db, 'globalProducts/');
    </script>
    <style>
        /* ... (Garde ton style CSS intact) ... */
    </style>
</head>
<body>
    <!-- ... (Garde ton HTML intact) ... -->

    <script>
        const compteUtilisateur = JSON.parse(localStorage.getItem('compte_utilisateur')) || {};
        const currentShopName = compteUtilisateur.shopName || "Boutique Vogue";
        
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('shopTitle').innerText = "🏪 " + currentShopName;
            
            // Écoute Firebase pour mise à jour automatique
            onValue(window.dbRef, (snapshot) => {
                const data = snapshot.val() || [];
                localStorage.setItem('globalProducts', JSON.stringify(data));
                afficherMesArticles();
            });
        });

        document.getElementById('publishForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('prodName').value.trim();
            const price = document.getElementById('prodPrice').value.trim();
            const description = document.getElementById('prodDesc').value.trim();
            const imageFile = document.getElementById('prodImage').files[0];

            const reader = new FileReader();
            reader.onloadend = function() {
                const newProduct = { id: Date.now(), name, price, description, image: reader.result, shopName: currentShopName };
                
                let globalProducts = JSON.parse(localStorage.getItem('globalProducts')) || [];
                globalProducts.push(newProduct);
                
                // Sauvegarde Firebase + Local
                localStorage.setItem('globalProducts', JSON.stringify(globalProducts));
                window.saveToFirebase(globalProducts);

                document.getElementById('publishForm').reset();
                alert("✨ Succès ! Synchronisé avec le serveur.");
            };
            reader.readAsDataURL(imageFile);
        });

        window.supprimerArticle = function(productId) {
            if (confirm("Voulez-vous vraiment retirer cet article ?")) {
                let globalProducts = JSON.parse(localStorage.getItem('globalProducts')) || [];
                globalProducts = globalProducts.filter(p => p.id !== productId);
                
                localStorage.setItem('globalProducts', JSON.stringify(globalProducts));
                window.saveToFirebase(globalProducts); // Mise à jour du serveur
            }
        };

        function afficherMesArticles() {
            const tbody = document.getElementById('myProductsTable');
            if (!tbody) return;
            const globalProducts = JSON.parse(localStorage.getItem('globalProducts')) || [];
            const myProducts = globalProducts.filter(p => p.shopName === currentShopName);

            tbody.innerHTML = myProducts.length === 0 ? `<tr><td colspan="5" style="text-align:center;">Aucun article.</td></tr>` : "";
            myProducts.forEach(product => {
                tbody.innerHTML += `<tr><td><img src="${product.image}" class="product-thumb"></td><td>${product.name}</td><td>${product.price} $</td><td>${product.description}</td><td><button class="btn-delete" onclick="supprimerArticle(${product.id})"><i class="fa-solid fa-trash-can"></i></button></td></tr>`;
            });
        }
    </script>
</body>
</html>
