<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Vitrine Boutique</title>
    <style>
        .grid-produits { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .btn-panier { background: #25d366; color: white; border: none; padding: 10px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1 id="titre-boutique">Articles de la boutique</h1>
    <div class="grid-produits" id="vitrine-container"></div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    // ... (Ton code firebaseConfig ici) ...

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 1. Récupérer l'ID dans l'URL
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    if (productId) {
        // 2. Chercher ce produit précis dans Firebase
        const dbRef = ref(db);
        get(child(dbRef, `globalProducts/${productId}`)).then((snapshot) => {
            if (snapshot.exists()) {
                const item = snapshot.val();
                
                // 3. Afficher les infos dans ta page (remplace les IDs par les tiens)
                document.getElementById('nomProduit').innerText = item.nom;
                document.getElementById('prixProduit').innerText = item.prix + " $";
                document.getElementById('imageProduit').src = item.image;
            } else {
                console.log("Produit introuvable");
            }
        });
    }
</script>
</body>
</html>
