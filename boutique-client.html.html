<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Vitrine Boutique</title>
    <style>
        .grid-produits { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .btn-panier { background: #25d366; color: white; border: none; padding: 10px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1 id="titre-boutique">Articles de la boutique</h1>
    <div class="grid-produits" id="vitrine-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = { /* MÊME CONFIG QUE PLUS HAUT */ };
        initializeApp(firebaseConfig);
        const db = getDatabase();

        const params = new URLSearchParams(window.location.search);
        const idBoutique = params.get('id');

        onValue(ref(db, 'articles/'), (snapshot) => {
            const container = document.getElementById('vitrine-container');
            container.innerHTML = "";
            const articles = snapshot.val();
            
            if (articles) {
                Object.values(articles).forEach(art => {
                    // Si l'article appartient à la boutique, on l'affiche
                    if (art.boutiqueID === idBoutique) {
                        container.innerHTML += `
                            <div class="card">
                                <img src="${art.image}" style="width:100%; height:150px; object-fit:cover;">
                                <h3>${art.nom}</h3>
                                <p>${art.prix} $</p>
                                <button class="btn-panier" onclick="alert('Ajouté au panier !')">Ajouter</button>
                            </div>`;
                    }
                });
            }
        });
    </script>
</body>
</html>
