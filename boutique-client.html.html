<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Vitrine Boutique | Karnash</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f9f8fa; padding: 20px; }
        .grid-produits { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .btn-panier { background: #6a2b83; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Articles de la boutique</h1>
    <div class="grid-produits" id="vitrine-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAqMJkvmJr_-izr7PzWL-SdlRovtMQoFs",
            authDomain: "karnash-marketplace-de-la-mode.firebaseapp.com",
            projectId: "karnash-marketplace-de-la-mode",
            storageBucket: "karnash-marketplace-de-la-mode.firebasestorage.app",
            messagingSenderId: "94247832680",
            appId: "1:94247832680:web:dc4b82a1d46b008049bfdd"
        };
        initializeApp(firebaseConfig);
        const db = getDatabase();

        // Récupère l'ID boutique dans l'adresse (URL)
        const urlParams = new URLSearchParams(window.location.search);
        const boutiqueId = urlParams.get('id');

        onValue(ref(db, 'articles/'), (snapshot) => {
            const articles = snapshot.val();
            const container = document.getElementById('vitrine-container');
            container.innerHTML = "";

            if (articles) {
                Object.values(articles).forEach(art => {
                    // Si l'article appartient à la boutique cliquée, on l'affiche
                    if (art.boutiqueID === boutiqueId) {
                        container.innerHTML += `
                            <div class="card">
                                <img src="${art.image}" style="width:100%; height:150px; object-fit:cover;">
                                <h3>${art.nom}</h3>
                                <p>${art.prix} $</p>
                                <button class="btn-panier" onclick="ajouterAuPanier('${art.nom}', ${art.prix})">Ajouter au panier</button>
                            </div>
                        `;
                    }
                });
            }
        });

        window.ajouterAuPanier = function(nom, prix) {
            let panier = JSON.parse(localStorage.getItem('panier')) || [];
            panier.push({ nom: nom, prix: prix });
            localStorage.setItem('panier', JSON.stringify(panier));
            alert(nom + " ajouté au panier !");
        };
    </script>
</body>
</html>
