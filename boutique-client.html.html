<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détails</title>
</head>
<body>
    <div id="details">Chargement...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const app = initializeApp({ /* ta config */ });
        const db = getDatabase(app);
        
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        get(ref(db, 'globalProducts/' + id)).then((snapshot) => {
            const item = snapshot.val();
            document.getElementById('details').innerHTML = `
                <h1>${item.nom}</h1>
                <p>Prix : ${item.prix} $</p>
                <a href="commande.html?nom=${item.nom}&prix=${item.prix}">Commander</a>
                <br>
                <a href="https://wa.me/243XXXXXXXXXX?text=Intéressé par ${item.nom}">Discuter par WhatsApp</a>
            `;
        });
    </script>
</body>
</html>
