<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karnash Marketplace</title>
    <style>
        /* Design Moderne */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; color: #333; }
        header { background: linear-gradient(135deg, #6a2b83, #8e44ad); color: white; padding: 3rem 1rem; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* Grille Responsive */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        /* Cartes Boutiques */
        .store-card { background: white; border-radius: 20px; padding: 20px; transition: transform 0.3s, box-shadow 0.3s; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); border: 1px solid #eee; }
        .store-card:hover { transform: translateY(-12px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .store-card h3 { margin: 15px 0; color: #6a2b83; }
        .btn { display: inline-block; background: #ff4757; color: white; padding: 12px 25px; text-decoration: none; border-radius: 25px; font-weight: bold; transition: background 0.3s; }
        .btn:hover { background: #ff6b81; }
    </style>
</head>
<body>

    <header>
        <h1>Karnash Marketplace</h1>
        <p>Découvrez les meilleures boutiques et articles de mode</p>
    </header>

    <div class="container">
        <div id="storesGrid" class="grid">
            <p style="text-align:center; width:100%;">Chargement des boutiques...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        // CONFIGURATION (Remplace avec tes vraies données)
        const firebaseConfig = { 
            /* Ton objet config */ 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const storesRef = ref(db, 'boutiques/'); 

        onValue(storesRef, (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('storesGrid');
            grid.innerHTML = "";

            if (data) {
                Object.keys(data).forEach(id => {
                    const shop = data[id];
                    grid.innerHTML += `
                        <div class="store-card">
                            <h3>${shop.nom || "Boutique"}</h3>
                            <p>Explorez notre catalogue exclusif</p>
                            <a href="boutique-client.html?boutiqueId=${id}" class="btn">Voir les articles</a>
                        </div>`;
                });
            } else {
                grid.innerHTML = "<p>Aucune boutique disponible pour le moment.</p>";
            }
        });
    </script>
</body>
</html>
