       <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Karnash Marketplace</title>
    
    <style>
        body <style>
    body { font-family: 'Poppins', sans-serif; background: #f9f8fa; margin: 0; padding: 20px; }
    
    /* Grille qui s'adapte mieux */
    .grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
        gap: 25px; 
        max-width: 1200px; 
        margin: auto; 
    }

    /* Carte élégante */
    .store-card { 
        background: white; 
        border-radius: 15px; 
        overflow: hidden; 
        box-shadow: 0 6px 12px rgba(0,0,0,0.08); 
        transition: transform 0.3s ease;
        display: flex;
        flex-direction: column;
    }
    .store-card:hover { transform: translateY(-5px); }

    /* Image centrée et propre */
    .store-banner img { 
        width: 100%; 
        height: 200px; 
        object-fit: cover; 
    }

    /* Texte bien présenté */
    .card-content { padding: 15px; text-align: center; }
    .card-content h3 { margin: 10px 0; font-size: 1.2rem; color: #333; }
    .card-content p { color: #6a2b83; font-weight: bold; margin-bottom: 15px; }

    /* Bouton design */
    .btn { 
        background: #6a2b83; 
        color: white; 
        padding: 12px; 
        border-radius: 8px; 
        text-decoration: none; 
        display: block; 
        text-align: center;
        font-weight: 600;
    }
</style>
<body>
  

    <h1 style="text-align:center; padding: 20px;">Nos Boutiques Partenaires</h1>
    
    <div class="grid" id="storesGrid">
        </div>
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAqMJkvmJr_-izr7PzWL-SdlRovtMQoFs",
        authDomain: "karnash-marketplace-de-la-mode.firebaseapp.com",
        projectId: "karnash-marketplace-de-la-mode",
        storageBucket: "karnash-marketplace-de-la-mode.firebasestorage.app",
        messagingSenderId: "94247832680",
        appId: "1:94247832680:web:dc4b82a1d46b008049bfdd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Connexion au dossier globalProductss
    const productsRef = ref(db, 'globalProducts/');
    
    onValue(productsRef, (snapshot) => {
        const data = snapshot.val();
        const grid = document.getElementById('storesGrid');
        grid.innerHTML = ""; // Vide la grille pour éviter les doublons

        if (data) {
            Object.keys(data).forEach(id => {
                const item = data[id];
                // Création dynamique de la carte produit
                grid.innerHTML += `
                    <div class="store-card">
                        <div class="store-banner">
                            <img src="${item.image || 'https://via.placeholder.com/300'}" alt="Produit">
                        </div>
                        <h3>${item.nom || "Article"}</h3>
                        <p>${item.prix ? item.prix + ' $' : 'Prix non défini'}</p>
                        <a href="boutique-client.html?id=${id}" class="btn">Voir détails</a>
                    </div>`;
            });
        } else {
            grid.innerHTML = "<p style='text-align:center; width:100%;'>Aucun produit trouvé dans la base.</p>";
        }
    });
</script>
