<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karnash Marketplace | Toutes les Boutiques</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #1a0933; --accent-purple: #6a2b83; --accent-gold: #cca43b; --bg-light: #f9f8fa; --text-dark: #2d2438; --text-muted: #796e85; --white: #ffffff; --shadow: 0 4px 15px rgba(26, 9, 51, 0.08); }
        body { background-color: var(--bg-light); color: var(--text-dark); margin: 0; font-family: 'Poppins', sans-serif; }
        .navbar { background: var(--white); display: flex; justify-content: space-between; align-items: center; padding: 12px 8%; box-shadow: var(--shadow); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 0 8% 60px; }
        .store-card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); text-align: center; }
        .store-banner { height: 140px; position: relative; background-color: var(--primary-color); }
        .store-banner img { width: 100%; height: 100%; object-fit: cover; }
        .store-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent-gold); position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; justify-content: center; background: white; font-weight: bold; }
        .store-body { padding: 55px 20px 25px; }
        .btn { display: inline-block; background: var(--accent-purple); color: white; padding: 10px 25px; border-radius: 50px; text-decoration: none; width: 80%; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo-text">KARNASH<span>.Marketplace</span></div>
    </header>

    <div class="page-header" style="background:#1a0933; color:white; padding:40px; text-align:center;">
        <h1>Nos Boutiques Partenaires</h1>
    </div>

    <section class="section">
        <div class="grid" id="storesGrid">
            <div class="store-card">
                <div class="store-banner"><img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=600" alt="Bannière"><div class="store-avatar">FK</div></div>
                <div class="store-body"><h3>Fashion Kin</h3><a href="boutique.html" class="btn">Visiter</a></div>
            </div>
            <div class="store-card">
                <div class="store-banner"><img src="https://images.unsplash.com/photo-1509631179647-0177331693ae?w=600" alt="Bannière"><div class="store-avatar">SA</div></div>
                <div class="store-body"><h3>Style Africa</h3><a href="boutique.html" class="btn">Visiter</a></div>
            </div>
            <div class="store-card">
                <div class="store-banner"><img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=600" alt="Bannière"><div class="store-avatar">CC</div></div>
                <div class="store-body"><h3>Congo Chic</h3><a href="boutique.html" class="btn">Visiter</a></div>
            </div>
            <div class="store-card">
                <div class="store-banner"><img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=600" alt="Bannière"><div class="store-avatar">KDF</div></div>
                <div class="store-body"><h3>Karnash Drul</h3><a href="boutique.html" class="btn">Visiter</a></div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAqMJkvmJr_-izr7PzWL-SdlRovtMQoFs",
            authDomain: "karnash-marketplace-de-la-mode.firebaseapp.com",
            projectId: "karnash-marketplace-de-la-mode",
            storageBucket: "karnash-marketplace-de-la-mode.firebasestorage.app",
            messagingSenderId: "94247832680",
            appId: "1:94247832680:web:dc4b82a1d46b008049bfdd"
        };
        initializeApp(firebaseConfig);
        console.log("Firebase est bien connecté !");
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAqMJkvmJr_-izr7PzWL-SdlRovtMQoFs",
        authDomain: "karnash-marketplace-de-la-mode.firebaseapp.com",
        projectId: "karnash-marketplace-de-la-mode",
        storageBucket: "karnash-marketplace-de-la-mode.firebasestorage.app",
        messagingSenderId: "94247832680",
        appId: "1:94247832680:web:dc4b82a1d46b008049bfdd"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Écoute les données
    onValue(ref(db, 'boutiques/'), (snapshot) => {
        const grid = document.getElementById('storesGrid');
        const boutiques = snapshot.val();
        
        // Si on a des données dans Firebase, on affiche celles de Firebase
        if (boutiques) {
            grid.innerHTML = ""; // Vider pour afficher les données du cloud
            Object.values(boutiques).forEach(store => {
                grid.innerHTML += `
                    <div class="store-card">
                        <div class="store-banner">
                            <img src="${store.banner}" alt="Bannière">
                            <div class="store-avatar">${store.shortName}</div>
                        </div>
                        <div class="store-body">
                            <h3 class="store-name">${store.name}</h3>
                            <a href="boutique.html" class="btn">Visiter</a>
                        </div>
                    </div>`;
            });
        } 
        // Si Firebase est vide, on laisse le HTML original (tes 4 cartes) tranquille
    });
</script>
</body>
</html>
