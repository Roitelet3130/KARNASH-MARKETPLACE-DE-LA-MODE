<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Karnash Marketplace</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f9f8fa; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px; }
        .store-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; padding-bottom: 20px; }
        .store-banner img { width: 100%; height: 150px; object-fit: cover; }
        .btn { display: inline-block; background: #6a2b83; color: white; padding: 10px 25px; border-radius: 50px; text-decoration: none; margin-top: 15px; }
    </style>
</head>
<body>

    <h1 style="text-align:center; padding: 20px;">Nos Boutiques Partenaires</h1>
    
    <div class="grid" id="storesGrid">
        </div>
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAqMJkvmJr_-izr7PzWL-SdlRovtMQoFs",
        authDomain: "karnash-marketplace-de-la-mode.firebaseapp.com",
        projectId: "karnash-marketplace-de-la-mode",
        storageBucket: "karnash-marketplace-de-la-mode.firebasestorage.app",
        messagingSenderId: "94247832680",
        appId: "1:94247832680:web:dc4b82a1d46b008049bfdd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Connexion au dossier globalProductss
    const productsRef = ref(db, 'globalProducts/');
    
    onValue(productsRef, (snapshot) => {
        const data = snapshot.val();
        const grid = document.getElementById('storesGrid');
        grid.innerHTML = ""; // Vide la grille pour éviter les doublons

        if (data) {
            Object.keys(data).forEach(id => {
                const item = data[id];
                // Création dynamique de la carte produit
                grid.innerHTML += `
                    <div class="store-card">
                        <div class="store-banner">
                            <img src="${item.image || 'https://via.placeholder.com/300'}" alt="Produit">
                        </div>
                        <h3>${item.nom || "Article"}</h3>
                        <p>${item.prix ? item.prix + ' $' : 'Prix non défini'}</p>
                        <a href="boutique-client.html?id=${id}" class="btn">Voir détails</a>
                    </div>`;
            });
        } else {
            grid.innerHTML = "<p style='text-align:center; width:100%;'>Aucun produit trouvé dans la base.</p>";
        }
    });
</script>

</body>
</html>
