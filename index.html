<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Karnash Market - Boutique</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAqMJkvmJr_-izr7PzWL-SdlRovtMQoFs",
            authDomain: "karnash-marketplace-de-la-mode.firebaseapp.com",
            projectId: "karnash-marketplace-de-la-mode",
            storageBucket: "karnash-marketplace-de-la-mode.firebasestorage.app",
            messagingSenderId: "94247832680",
            appId: "1:94247832680:web:dc4b82a1d46b008049bfdd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Écoute automatique des produits
        onValue(ref(db, 'produits/'), (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('catalogue');
            container.innerHTML = ""; // Vide le catalogue actuel

            if (data) {
                Object.values(data).forEach(p => {
                    container.innerHTML += `
                        <div class="card">
                            <h3>${p.nom}</h3>
                            <p>Prix: ${p.prix} $</p>
                            <p>${p.description || ''}</p>
                        </div>
                    `;
                });
            }
        });
    </script>
</head>
<body>
    <h1>Catalogue Karnash</h1>
    <div id="catalogue">Chargement des articles en temps réel...</div>
</body>
</html>
